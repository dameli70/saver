<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M96 0H0V96" stroke="#FFF4D2" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>

    <pattern id="microGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#FFF4D2" stroke-opacity="0.025" stroke-width="1"/>
    </pattern>

    <linearGradient id="fade" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF4D2" stop-opacity="0.00"/>
      <stop offset="0.35" stop-color="#FFF4D2" stop-opacity="0.10"/>
      <stop offset="0.70" stop-color="#F5C842" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#F5C842" stop-opacity="0.00"/>
    </linearGradient>
  </defs>

  <!-- Subtle structure: rooms (grid), vault door (rings + spokes), tontine (links + nodes). -->
  <rect width="1200" height="800" fill="url(#microGrid)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <rect width="1200" height="800" fill="url(#fade)" opacity="0.55"/>

  <!-- Vault door (top-right) -->
  <g stroke="#FFF4D2" stroke-opacity="0.10" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="860" cy="290" r="248"/>
    <circle cx="860" cy="290" r="194"/>
    <circle cx="860" cy="290" r="124"/>

    <line x1="860" y1="290" x2="860" y2="96"/>
    <line x1="860" y1="290" x2="860" y2="484" transform="rotate(60 860 290)"/>
    <line x1="860" y1="290" x2="860" y2="484" transform="rotate(120 860 290)"/>
    <line x1="860" y1="290" x2="860" y2="484" transform="rotate(180 860 290)"/>
    <line x1="860" y1="290" x2="860" y2="484" transform="rotate(240 860 290)"/>
    <line x1="860" y1="290" x2="860" y2="484" transform="rotate(300 860 290)"/>

    <circle cx="860" cy="96" r="8"/>
    <circle cx="860" cy="484" r="8"/>
    <circle cx="666" cy="290" r="8"/>
    <circle cx="1054" cy="290" r="8"/>

    <circle cx="860" cy="270" r="16" fill="#FFF4D2" fill-opacity="0.035"/>
    <path d="M854 288h12l-3 40h-6l-3-40Z" fill="#FFF4D2" fill-opacity="0.03"/>
  </g>

  <!-- Rooms / savings tiles (bottom-left) -->
  <g stroke="#F5C842" stroke-opacity="0.07" stroke-width="1.2" stroke-linecap="round">
    <path d="M84 520H444M84 584H444M84 648H444M84 712H444"/>
    <path d="M84 520V712M174 520V712M264 520V712M354 520V712M444 520V712"/>

    <path d="M120 742c20-26 54-26 74 0"/>
    <path d="M218 742c20-26 54-26 74 0"/>
    <path d="M316 742c20-26 54-26 74 0"/>
  </g>

  <!-- Tontine / trust links (mid-field) -->
  <g stroke="#FFF4D2" stroke-opacity="0.075" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M160 250C310 160 420 160 560 250"/>
    <path d="M560 250C700 340 780 356 940 318"/>
    <path d="M260 360C430 420 520 470 650 560"/>

    <circle cx="160" cy="250" r="6" fill="#FFF4D2" fill-opacity="0.03"/>
    <circle cx="560" cy="250" r="6" fill="#FFF4D2" fill-opacity="0.03"/>
    <circle cx="940" cy="318" r="6" fill="#FFF4D2" fill-opacity="0.03"/>
    <circle cx="260" cy="360" r="6" fill="#FFF4D2" fill-opacity="0.03"/>
    <circle cx="650" cy="560" r="6" fill="#FFF4D2" fill-opacity="0.03"/>
  </g>
</svg>
